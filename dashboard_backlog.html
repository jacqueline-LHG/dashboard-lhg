hover:not(.active){border-color:var(--na);color:var(--na)}.hm-wrap{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0}.hm-scroll{flex:1;overflow:auto;min-height:0;min-width:0;border-radius:6px}table.hm{border-collapse:collapse;table-layout:fixed}table.hm col.hm-col-act{width:200px}table.hm col.hm-col-day{width:29px}table.hm th,table.hm td{text-align:center;padding:4px 2px;font-size:clamp(.68rem,.85vw,.95rem);white-space:nowrap;border:1px solid #fff}table.hm thead th{background:#F8F8F8;color:#666;font-weight:700;position:sticky;z-index:2}table.hm thead tr.hm-fila-mes th{top:0;height:22px;letter-spacing:.04em;text-transform:uppercase;font-size:clamp(.55rem,.68vw,.76rem)}table.hm thead tr.hm-fila-dia th{top:22px}table.hm th.hm-act-h{position:sticky;left:0;top:0;z-index:4;background:#F8F8F8;text-align:left;padding-left:8px}table.hm td.hm-act{text-align:left;font-weight:700;font-size:clamp(.7rem,.9vw,1rem);background:#fff;position:sticky;left:0;z-index:1;padding-left:8px;color:#1A1A1A}table.hm tr.hm-grupo td{background:#E0E0E0;font-weight:700;text-align:left;color:#1A1A1A;padding-left:8px;position:static}table.hm tr.hm-total td{background:#F0F0F0;font-weight:700;border-top:2px solid #E8500A;position:static}table.hm tr.hm-total td.hm-act{position:sticky;left:0;background:#F0F0F0}.legend{display:flex;gap:1.2vw;align-items:center;margin-top:.4vh;flex-wrap:wrap;flex-shrink:0}.li{display:flex;align-items:center;gap:5px;font-size:clamp(.55rem,.7vw,.78rem);color:var(--gr)}.grad{width:140px;height:12px;border-radius:3px;background:linear-gradient(to right,hsl(120,75%,88%),hsl(30,75%,70%) 70%,hsl(0,75%,50%))}</style>

function colorFor(v,maxV){
  if(v<=0)return{bg:"#ffffff",fg:"#ccc"};
  const ratio=Math.min(v/maxV,1);
  let hue,light;
  if(ratio<=0.7){
    const t=ratio/0.7;
    hue=120-90*t;
    light=88-18*t;
  }else{
    const t2=(ratio-0.7)/0.3;
    hue=30-30*t2;
    light=70-20*t2;
  }
  const bg="hsl("+hue.toFixed(0)+",75%,"+light.toFixed(0)+"%)";
  const fg=ratio>0.55?"#fff":"#333";
  return{bg,fg};
}
let scrollEl=null;
let FLOTA="AC";
function setFlota(f){
  FLOTA=f;
  const sl=scrollEl?scrollEl.scrollLeft:null;
  render(sl);
}
function render(preserveScroll){
  const area=document.getElementById("chart-area");
  area.innerHTML="";
  const toolbar=document.createElement("div");toolbar.className="toolbar";
  toolbar.innerHTML="<button id=\"btn-ac\" class=\"btn"+(FLOTA==="AC"?" active":"")+"\" onclick=\"setFlota('AC')\">A + C</button><button id=\"btn-todos\" class=\"btn"+(FLOTA==="TODOS"?" active":"")+"\" onclick=\"setFlota('TODOS')\">A + C + Top Off</button>";
  area.appendChild(toolbar);
  const wrap=document.createElement("div");wrap.className="hm-wrap";
  const scroll=document.createElement("div");scroll.className="hm-scroll";scrollEl=scroll;
  const table=document.createElement("table");table.className="hm";
  const nCols=DATA.columnas.length;
  const gruposVis=DATA.grupos.filter(g=>FLOTA==="TODOS"||g.nombre!=="Top Off");
  let colgroup="<colgroup><col class=\"hm-col-act\"/>"+DATA.columnas.map(()=>"<col class=\"hm-col-day\"/>").join("")+"</colgroup>";
  let filaMes="<tr class=\"hm-fila-mes\"><th class=\"hm-act-h\" rowspan=\"2\">Activo</th>"+DATA.meses.map(m=>"<th colspan=\""+m.count+"\">"+m.label+"</th>").join("")+"</tr>";
  let filaDia="<tr class=\"hm-fila-dia\">"+DATA.columnas.map((d,i)=>"<th"+(i===DATA.hoy_idx?" style=\"color:var(--na)\"":"")+">"+d+"</th>").join("")+"</tr>";
  let thead="<thead>"+filaMes+filaDia+"</thead>";
  let tbody="<tbody>";
  gruposVis.forEach(g=>{
    tbody+="<tr class=\"hm-grupo\"><td colspan=\""+(nCols+1)+"\">"+g.nombre+"</td></tr>";
    g.activos.forEach(a=>{
      tbody+="<tr><td class=\"hm-act\">"+a.nombre+"</td>"+a.valores.map(v=>{
        if(v==null)return "<td></td>";
        const c=colorFor(v,DATA.max_val);
        return "<td style=\"background:"+c.bg+";color:"+c.fg+"\">"+(v>0?v:"")+"</td>";
      }).join("")+"</tr>";
    });
  });
  const totalVis=new Array(nCols).fill(null);
  for(let i=0;i<nCols;i++){
    let s=null;
    gruposVis.forEach(g=>g.activos.forEach(a=>{const v=a.valores[i];if(v!=null)s=(s||0)+v;}));
    totalVis[i]=s;
  }
  tbody+="<tr class=\"hm-total\"><td class=\"hm-act\">TOTAL "+(FLOTA==="TODOS"?"GENERAL":"A + C")+"</td>"+totalVis.map(v=>v==null?"<td></td>":"<td>"+v+"</td>").join("")+"</tr>";
  tbody+="</tbody>";
  table.innerHTML=colgroup+thead+tbody;
  scroll.appendChild(table);wrap.appendChild(scroll);
  const leg=document.createElement("div");leg.className="legend";
  leg.innerHTML="<div class=\"li\">Menos<div class=\"grad\"></div>Más</div><div class=\"li\">Verde → Naranja desde 70% → Rojo cerca del máximo</div>";
  wrap.appendChild(leg);
  area.appendChild(wrap);
  if(preserveScroll!=null){scrollEl.scrollLeft=preserveScroll;}
  else{requestAnimationFrame(()=>requestAnimationFrame(()=>irAlFinal(false)));}
}
function irAlFinal(smooth){

const pad=n=>String(n).padStart(2,"0");

const MN=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
