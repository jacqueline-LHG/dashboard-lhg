<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard Disponibilidad – Lhg Mining</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--na:#E8500A;--ng:#1A1A1A;--gr:#666;--g2:#E8E8E8;
          --ve:#27AE60;--ro:#E74C3C;--az:#2980B9;--am:#F39C12}
    html,body{height:100%;background:#F0F2F5;font-family:'Inter',Arial,sans-serif;color:var(--ng);overflow:hidden}
    .w{height:100vh;display:grid;grid-template-rows:auto 4px 1fr auto;padding:1.2vh 1.8vw;gap:.6vh}
    header{display:flex;align-items:center;justify-content:space-between;
           background:#fff;padding:.8vh 1.4vw;border-radius:10px;border-bottom:3px solid var(--na)}
    .logo{height:40px;width:auto}
    .htit{text-align:center;flex:1;padding:0 1vw}
    .htit h1{font-size:clamp(1rem,1.5vw,1.6rem);font-weight:700}
    .htit .sub{font-size:clamp(.75rem,1.05vw,1.15rem);font-weight:600;color:var(--na);margin-top:3px}
    .hright{text-align:right;min-width:180px}
    .hfecha{font-size:clamp(.6rem,.78vw,.86rem);color:var(--gr);margin-bottom:2px}
    .hhora{font-size:clamp(.95rem,1.35vw,1.5rem);font-weight:700;letter-spacing:.04em;
           font-variant-numeric:tabular-nums;line-height:1;color:var(--ng)}
    .hmes-sel{margin-top:3px}
    .hmes-sel select{font-size:clamp(.52rem,.72vw,.8rem);font-family:'Inter',Arial,sans-serif;
                     border:1.5px solid var(--na);border-radius:5px;padding:1px 4px;
                     color:var(--na);font-weight:700;background:#fff;cursor:pointer}
    .progress-bar{height:4px;background:var(--g2);border-radius:2px;overflow:hidden;align-self:center}
    .progress-fill{height:100%;background:var(--na);border-radius:2px;width:0%}
    .chart-area{background:#fff;border-radius:10px;padding:1.2vh 1.5vw;
                box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column}
    .chart-title{font-size:clamp(.7rem,.95vw,1.05rem);font-weight:700;text-transform:uppercase;
                 letter-spacing:.07em;border-bottom:2px solid var(--na);
                 padding-bottom:.4vh;margin-bottom:.6vh;color:var(--ng)}
    .chart-title span{color:var(--na)}
    .chart-wrap{flex:1;position:relative;min-height:0}
    .legend{display:flex;gap:1.5vw;align-items:center;margin-top:.4vh;flex-wrap:wrap}
    .li{display:flex;align-items:center;gap:5px;font-size:clamp(.5rem,.68vw,.76rem);color:var(--gr)}
    .ld{width:14px;height:14px;border-radius:3px;flex-shrink:0}
    footer{display:flex;justify-content:space-between;align-items:center;
           font-size:clamp(.75rem,1vw,1.1rem);color:var(--gr);
           background:#fff;padding:.45vh 1.4vw;border-radius:10px}
    footer strong{color:var(--ng)}
    .fade{animation:fadeIn .4s ease-in}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
<script>
(function(){
  var PASS='LHGPCM.26',KEY='dash_lhg_auth';
  if(localStorage.getItem(KEY)!==PASS){
    var inp=prompt('Dashboard LHG Mining\nIngrese la contraseña:');
    if(inp!==PASS){document.documentElement.innerHTML='<div style="font-family:Arial;text-align:center;margin-top:30vh;font-size:1.1rem;color:#E8500A;font-weight:700">Acceso denegado.<br><br><button onclick="location.reload()" style="margin-top:1rem;padding:.5rem 1.5rem;background:#E8500A;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:1rem">Reintentar</button></div>';return;}
    localStorage.setItem(KEY,PASS);
  }
})();
</script>

// ── COLORES ──────────────────────────────────────────────────────────────────
const C_TEC   = '#5BA4CF';   // celeste — Disp. Técnica activos
const C_OP    = '#E8936A';   // naranja/coral — Disp. Tec+Op activos
const C_TOT_T = '#F4C842';   // amarillo — total supervisor / flota
const C_TOT_O = '#5BA85A';   // verde — total flota (segunda barra total)
const C_META  = '#27AE60';   // verde liso — línea meta

// ── PREPARAR DATOS CON TOTAL AL FINAL ────────────────────────────────────────
function withTotal(datos, labelTotal) {
  if(!datos||!datos.length) return {labels:[], tec:[], op:[], isTot:[]};
  // Calcular promedio ignorando nulls (igual que DAX)
  const tecVals = datos.map(b=>b.disp_tec).filter(v=>v!==null&&v!==undefined);
  const opVals  = datos.map(b=>b.disp_tec_op).filter(v=>v!==null&&v!==undefined);
  const totTec  = tecVals.length ? Math.round(tecVals.reduce((a,b)=>a+b,0)/tecVals.length*10)/10 : null;
  const totOp   = opVals.length  ? Math.round(opVals.reduce((a,b)=>a+b,0)/opVals.length*10)/10  : null;
  const labels  = [...datos.map(b=>b.nombre), labelTotal];
  const tec     = [...datos.map(b=>b.disp_tec),    totTec];
  const op      = [...datos.map(b=>b.disp_tec_op), totOp];
  const isTot   = [...datos.map(()=>false), true];
  return {labels, tec, op, isTot};
}

// ── CONSTRUIR UN CHART ────────────────────────────────────────────────────────
function buildChart(ctx, datos, labelTotal, titulo) {
  const {labels, tec, op, isTot} = withTotal(datos, labelTotal);
  const n = labels.length;

  const bgTec = labels.map((_,i)=> isTot[i] ? C_TOT_T : C_TEC);
  const bgOp  = labels.map((_,i)=> isTot[i] ? C_TOT_O : C_OP);

  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Disp. Técnica',
          data: tec,
          backgroundColor: bgTec,
          borderRadius: 4,
          barPercentage: .78,
          categoryPercentage: .85,
          datalabels: { anchor:'end', align:'top', formatter: v=>v!==null?v+'%':'', font:{size:9,weight:'700'}, color:'#333' }
        },
        {
          label: 'Disp. Tec+Op',
          data: op,
          backgroundColor: bgOp,
          borderRadius: 4,
          barPercentage: .78,
          categoryPercentage: .85,
          datalabels: { anchor:'end', align:'top', formatter: v=>v!==null?v+'%':'', font:{size:9,weight:'700'}, color:'#333' }
        },
        {
          label: 'Meta 90%',
          type: 'line',
          data: new Array(n).fill(90),
          borderColor: C_META,
          borderWidth: 2.5,
          pointRadius: 0,
          borderDash: [],   // línea lisa
          fill: false,
          datalabels: { display: false }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      layout: { padding: { top: 22 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.dataset.label+': '+(c.raw!==null?c.raw+'%':'N/A') } },
        datalabels: {}   // activar plugin
      },
      scales: {
        y: {
          min: 0, max: 115,
          ticks: { callback: v=>v<=110?v+'%':'', stepSize: 20, font:{size:11} },
          grid: { color: '#F0F0F0' }
        },
        x: { ticks: { font:{size:10}, maxRotation:40, minRotation:0 } }
      }
    }
  });
}

    wrap.style.cssText = 'flex:1;position:relative;min-height:0';
    const canvas = document.createElement('canvas');
    card.appendChild(stit);
    wrap.appendChild(canvas);
    card.appendChild(wrap);
    grid.appendChild(card);

    const datos = d.sv[sv] || [];
    const {labels, tec, op, isTot} = withTotal(datos, 'Total');
    const n = labels.length;
    const bgTec = labels.map((_,i)=> isTot[i] ? C_TOT_T : C_TEC);
    const bgOp  = labels.map((_,i)=> isTot[i] ? C_TOT_O : C_OP);

    new Chart(canvas, {
      type:'bar',
      data:{labels, datasets:[
        {label:'Disp. Técnica', data:tec, backgroundColor:bgTec, borderRadius:3, barPercentage:.78, categoryPercentage:.85,
         datalabels:{anchor:'end',align:'top',formatter:v=>v!==null?v+'%':'',font:{size:8,weight:'700'},color:'#333'}},
        {label:'Disp. Tec+Op',  data:op,  backgroundColor:bgOp,  borderRadius:3, barPercentage:.78, categoryPercentage:.85,
         datalabels:{anchor:'end',align:'top',formatter:v=>v!==null?v+'%':'',font:{size:8,weight:'700'},color:'#333'}},
        {label:'Meta 90%',type:'line',data:new Array(n).fill(90),
         borderColor:C_META,borderWidth:2,pointRadius:0,borderDash:[],fill:false,
         datalabels:{display:false}}
      ]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:200},
        layout:{padding:{top:16}},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.raw!==null?c.raw+'%':'N/A')}},datalabels:{}},
        scales:{
          y:{min:0,max:115,ticks:{callback:v=>v<=110?v+'%':'',stepSize:20,font:{size:9}},grid:{color:'#F0F0F0'}},
          x:{ticks:{font:{size:8},maxRotation:35}}
        }
      }
    });
  });

  // Leyenda
  const leg = document.createElement('div');
  leg.className = 'legend';
  leg.innerHTML = `
    <div class="li"><div class="ld" style="background:${C_TEC}"></div>Disp. Técnica</div>
    <div class="li"><div class="ld" style="background:${C_OP}"></div>Disp. Tec+Op</div>
    <div class="li"><div class="ld" style="background:${C_META};height:3px;border-radius:0;width:20px"></div>Meta 90%</div>
    <div class="li"><div class="ld" style="background:${C_TOT_T}"></div>Total supervisor</div>
  `;
  area.appendChild(leg);
}

// ── RENDER SLIDE ─────────────────────────────────────────────────────────────
function renderSlide() {
  const slide = SEQ[seqIdx];
  const d     = DISP_ALL[PERIODO_KEY];
  if(!d) return;
  const dur = slide.dur;

  // Fade
  const area = document.getElementById('chart-area');

  if(slide.tipo === 'sv_grid') {
    // Slide de 6 supervisores — reconstruir el DOM
    area.classList.remove('fade'); void area.offsetWidth; area.classList.add('fade');
    // Destruir charts previos
    if(chartInst){ chartInst.destroy(); chartInst=null; }
    Chart.helpers.each(Chart.instances, c=>c.destroy());
    buildSvSlide(d, d.label);
  } else {
    // Slides de flota — restaurar layout single-chart si fue reemplazado
    if(!document.getElementById('main-chart')) {
      area.innerHTML = `
        <div class="chart-title" id="chart-title">—</div>
        <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
        <div class="legend">
          <div class="li"><div class="ld" style="background:${C_TEC}"></div>Disp. Técnica</div>
          <div class="li"><div class="ld" style="background:${C_OP}"></div>Disp. Tec+Op</div>
          <div class="li"><div class="ld" style="background:${C_META};height:3px;border-radius:0;width:20px"></div>Meta 90%</div>
          <div class="li"><div class="ld" style="background:${C_TOT_T}"></div>Total supervisor</div>
          <div class="li"><div class="ld" style="background:${C_TOT_O}"></div>Total flota</div>
        </div>`;
    }
    area.classList.remove('fade'); void area.offsetWidth; area.classList.add('fade');
    if(chartInst){ chartInst.destroy(); chartInst=null; }

    let datos, labelTotal, titulo;
    if(slide.tipo === 'anual') {
      datos      = d['anual_'+slide.flota];
      labelTotal = 'Total '+(slide.flota==='A'?'Flota A':'Flota C');
      titulo     = 'Disponibilidad Acumulada — <span>'+(slide.flota==='A'?'Flota A':'Flota C')+' · hasta '+d.label+'</span>';
    } else {
      datos      = d['mes_'+slide.flota];
      labelTotal = 'Total '+(slide.flota==='A'?'Flota A':'Flota C');
      titulo     = 'Disponibilidad Mensual — <span>'+(slide.flota==='A'?'Flota A':'Flota C')+' · '+d.label+'</span>';
    }
    document.getElementById('chart-title').innerHTML = titulo;
    chartInst = buildChart(document.getElementById('main-chart'), datos||[], labelTotal, titulo);
  }

  document.getElementById('tv-sub').textContent = slide.label+' · '+d.label;
  startP(dur);
  clearTimeout(sT);
  sT = setTimeout(nextSlide, dur);
}

function nextSlide() {
  seqIdx = (seqIdx+1) % SEQ.length;
  if(seqIdx === 0){ location.reload(); return; }
  renderSlide();
}

const pad=n=>String(n).padStart(2,'0');
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MN=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function tick(){
  const n=new Date();
  document.getElementById('tv-hora').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  document.getElementById('tv-fecha').textContent=DIAS[n.getDay()]+', '+n.getDate()+' de '+MN[n.getMonth()]+' '+n.getFullYear();
}
tick();setInterval(tick,1000);
Chart.defaults.font.family="'Inter',Arial,sans-serif";
Chart.register(ChartDataLabels);
renderSlide();
setTimeout(()=>location.reload(), 5*60*1000);
</script>
</body>
