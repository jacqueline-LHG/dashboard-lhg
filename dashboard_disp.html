  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--na:#E8500A;--ng:#1A1A1A;--gr:#666;--g2:#E8E8E8}html,body{height:100%;background:#F0F2F5;font-family:'Inter',Arial,sans-serif;color:var(--ng);overflow:hidden}.w{height:100vh;display:grid;grid-template-rows:auto 4px 1fr auto;padding:1.2vh 1.8vw;gap:.6vh}header{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:.8vh 1.4vw;border-radius:10px;border-bottom:3px solid var(--na)}.logo{height:40px;width:auto}.htit{text-align:center;flex:1;padding:0 1vw}.htit h1{font-size:clamp(1rem,1.5vw,1.6rem);font-weight:700}.htit .sub{font-size:clamp(.75rem,1.05vw,1.15rem);font-weight:600;color:var(--na);margin-top:3px}.hright{text-align:right;min-width:180px}.hfecha{font-size:clamp(.6rem,.78vw,.86rem);color:var(--gr);margin-bottom:2px}.hhora{font-size:clamp(.95rem,1.35vw,1.5rem);font-weight:700;font-variant-numeric:tabular-nums;line-height:1}.hmes-sel{margin-top:3px}.hmes-sel select{font-size:clamp(.52rem,.72vw,.8rem);border:1.5px solid var(--na);border-radius:5px;padding:1px 4px;color:var(--na);font-weight:700;background:#fff;cursor:pointer}.progress-bar{height:4px;background:var(--g2);border-radius:2px;overflow:hidden;align-self:center}.progress-fill{height:100%;background:var(--na);border-radius:2px;width:0%}.chart-area{background:#fff;border-radius:10px;padding:1vh 1.5vw;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column;min-height:0}.chart-title{font-size:clamp(.9rem,1.2vw,1.35rem);font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--na);padding-bottom:.4vh;margin-bottom:.5vh;color:var(--ng);flex-shrink:0}.chart-title span{color:var(--na)}.chart-wrap{flex:1;position:relative;min-height:0}.legend{display:flex;gap:1.5vw;align-items:center;margin-top:.3vh;flex-wrap:wrap;flex-shrink:0}.li{display:flex;align-items:center;gap:5px;font-size:clamp(.5rem,.68vw,.76rem);color:var(--gr)}.ld{width:14px;height:14px;border-radius:3px;flex-shrink:0}footer{display:flex;justify-content:space-between;align-items:center;font-size:clamp(.75rem,1vw,1.1rem);color:var(--gr);background:#fff;padding:.45vh 1.4vw;border-radius:10px}footer strong{color:var(--ng)}.fade{animation:fadeIn .4s ease-in}@keyframes fadeIn{from{opacity:0}to{opacity:1}}</style>

      +"<div style='font-size:clamp(.6rem,.85vw,1rem);font-weight:700;color:var(--ng)'>"+titulo+"</div>"
      +"<div style='border:1.5px solid var(--na);border-radius:5px;padding:2px 8px;font-weight:800;color:var(--na);font-size:clamp(.65rem,.9vw,1.05rem)'>"+valor+"</div></div>";
    grid.appendChild(p);return p;}
  const p1=panel("Disponibilidad "+flLabel,dispAvg!=null?dispAvg+"%":"N/A");
  const wrap1=document.createElement("div");wrap1.style.cssText="flex:1;position:relative;min-height:0";
  const cv1=document.createElement("canvas");wrap1.appendChild(cv1);p1.appendChild(wrap1);
  const c1=new Chart(cv1,{type:"line",data:{labels,datasets:[{label:"Total",data:dispVals,borderColor:C_TEC,backgroundColor:C_TEC,borderWidth:3,pointRadius:4,pointBackgroundColor:C_TEC,tension:.25,spanGaps:false,
    datalabels:{align:"top",anchor:"end",formatter:v=>v!=null?v+"%":"",color:C_META,font:{size:LFS,weight:"700"}}}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},plugins:{legend:{display:false},datalabels:{}},
      scales:{y:{min:50,max:110,ticks:{callback:v=>v+"%",font:{size:LFS+2}},grid:{color:"#F0F0F0"}},x:{ticks:{font:{size:LFS}}}}}});
  allCharts.push(c1);
  const p2=panel("Backlog "+flLabel,blLast!=null?blLast:"N/A");
  const wrap2=document.createElement("div");wrap2.style.cssText="flex:2;position:relative;min-height:0";
  const cv2=document.createElement("canvas");wrap2.appendChild(cv2);p2.appendChild(wrap2);
  const c2=new Chart(cv2,{type:"line",data:{labels,datasets:[
    {label:"Backlog Total",data:blTot,borderColor:"#2C5F8A",backgroundColor:"#2C5F8A",borderWidth:2.5,pointRadius:3,tension:.2,spanGaps:false,datalabels:{align:"top",anchor:"end",formatter:v=>v!=null?v:"",color:"#2C5F8A",font:{size:LFS,weight:"700"}}},
    {label:"Backlog TAR",data:blTar,borderColor:C_OP,backgroundColor:C_OP,borderWidth:2.5,pointRadius:3,tension:.2,spanGaps:false,datalabels:{display:false}},
    {label:"Backlog PM",data:blPm,borderColor:C_TEC,backgroundColor:C_TEC,borderWidth:2.5,pointRadius:3,tension:.2,spanGaps:false,datalabels:{display:false}}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},plugins:{legend:{position:"bottom",labels:{boxWidth:10,font:{size:LFS-4}}},datalabels:{}},
      scales:{y:{beginAtZero:true,ticks:{font:{size:LFS+2}},grid:{color:"#F0F0F0"}},x:{ticks:{font:{size:LFS}}}}}});
  allCharts.push(c2);
  const tbl=document.createElement("table");
  tbl.style.cssText="width:100%;border-collapse:collapse;font-size:clamp(.5rem,.62vw,.68rem);margin-top:.4vh;flex-shrink:0";
  const fila=(nombre,arr,color)=>"<tr><td style='text-align:left;padding:2px 4px;font-weight:700;color:"+color+"'>"+nombre+"</td>"+arr.map(v=>"<td style='padding:2px 4px;text-align:center'>"+(v!=null?v:"—")+"</td>").join("")+"</tr>";
  tbl.innerHTML="<tr><th style='text-align:left;padding:2px 4px'></th>"+labels.map(l=>"<th style='padding:2px 4px;color:var(--gr);font-weight:700'>"+l.slice(0,3)+"</th>").join("")+"</tr>"
    +fila("Backlog Total",blTot,"#2C5F8A")+fila("Backlog TAR",blTar,C_OP)+fila("Backlog PM",blPm,C_TEC);
  p2.appendChild(tbl);}
function startP(dur){if(aF)cancelAnimationFrame(aF);const p=document.getElementById("prog");p.style.transition="none";p.style.width="0%";sS=performance.now();
  function step(ts){const pct=Math.min((ts-sS)/dur*100,100);p.style.width=pct+"%";if(pct<100)aF=requestAnimationFrame(step);}aF=requestAnimationFrame(step);}
function renderSlide(){
  const slide=SEQ[seqIdx];const d=DISP_ALL[PERIODO_KEY];if(!d)return;
  const area=document.getElementById("chart-area");
  area.classList.remove("fade");void area.offsetWidth;area.classList.add("fade");
  destroyAll();
  if(slide.tipo==="sv_grid"){buildSvGrid(d,slide.sv_mode);}
  else if(slide.tipo==="resumen"){buildResumen(d,slide);}
  else{
    restoreSingleChart();
    const datos=d[slide.sv_mode]||[];
    const flLabel={mes_A:"Flota A",mes_C:"Flota C"}[slide.sv_mode]||"";
    const titulo="Disponibilidad Mensual - <span>"+flLabel+" - "+d.label+"</span>";
    document.getElementById("chart-title").innerHTML=titulo;
    // tamaño de fuente para charts principales — cambiar aqui
    chartInst=makeChart(document.getElementById("main-chart"),datos,"Total "+flLabel,18);}
  document.getElementById("tv-sub").textContent=slide.label+" - "+d.label;
  startP(slide.dur);clearTimeout(sT);sT=setTimeout(nextSlide,slide.dur);}
function nextSlide(){seqIdx=(seqIdx+1)%SEQ.length;if(seqIdx===0){location.reload();return;}renderSlide();}
const pad=n=>String(n).padStart(2,"0");
const DIAS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MN=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
function tick(){const n=new Date();document.getElementById("tv-hora").textContent=pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());document.getElementById("tv-fecha").textContent=DIAS[n.getDay()]+", "+n.getDate()+" de "+MN[n.getMonth()]+" "+n.getFullYear();}
tick();setInterval(tick,1000);
Chart.defaults.font.family="'Inter',Arial,sans-serif";
Chart.register(ChartDataLabels);
renderSlide();
setTimeout(()=>location.reload(),5*60*1000);
</script>
